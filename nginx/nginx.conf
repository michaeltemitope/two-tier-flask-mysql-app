# =============================================================
# nginx.conf
# Purpose  : Reverse proxy and load balancer for Flask app
# Mounted  : ./nginx/nginx.conf → /etc/nginx/nginx.conf (ro)
# Traffic  : External port 80 → Flask containers on port 5000
# Algorithm: Round-robin (Nginx default — no directive needed)
# =============================================================

# Number of worker processes. auto sets it to match the number
# of available CPU cores on the host machine
worker_processes auto;

events {
    # Maximum simultaneous connections per worker process
    # 1024 is a sensible default for a small-scale deployment
    worker_connections 1024;
}

http {
    # ---------------------------------------------------------
    # Upstream Block
    # Defines the pool of Flask containers Nginx will balance
    # across. Docker Compose assigns each scaled container a
    # unique internal IP but they all share the service name
    # "flask". Nginx resolves "flask" to all running instances
    # automatically via Docker's internal DNS.
    #
    # Round-robin is Nginx's default — requests are distributed
    # one by one across each container in order. No extra
    # directive is needed to enable it.
    # ---------------------------------------------------------
    upstream flask_pool {
        server flask:5000;
    }

    # ---------------------------------------------------------
    # Server Block
    # Listens on port 80 for all incoming HTTP traffic
    # Proxies every request to the flask_pool upstream
    # ---------------------------------------------------------
    server {
        listen 80;

        location / {
            # Forward requests to the Flask upstream pool
            proxy_pass http://flask_pool;

            # Pass the original client IP to Flask so the app
            # sees the real requester, not Nginx's internal IP
            proxy_set_header X-Real-IP $remote_addr;

            # Pass the full chain of IPs if request went through
            # multiple proxies before reaching Nginx
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Pass the original Host header so Flask knows which
            # domain the client requested
            proxy_set_header Host $host;

            # Tell Flask the original request was HTTP
            # Useful if Flask ever needs to construct absolute URLs
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---------------------------------------------------------
        # Health check endpoint for Nginx itself
        # Returns 200 OK with no upstream involvement
        # Useful for external monitoring tools to verify Nginx
        # is running independently of the Flask containers
        # ---------------------------------------------------------
        location /nginx-health {
            access_log off;
            return 200 "Nginx is healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
