# =============================================================
# docker-compose.yml
# Purpose  : Orchestrates Nginx, Flask (x2), and MySQL together
# Usage    : docker-compose up --build
# Requires : .env file in the same directory
# Note     : version field intentionally omitted — deprecated
#            in Docker Compose v2 and later
# =============================================================
services:
  # -------------------------------------------------------------
  # MySQL Database Service
  # Starts first and must be healthy before Flask starts
  # Receives: MYSQL_ROOT_PASSWORD, MYSQL_USER, MYSQL_PASSWORD,
  #           MYSQL_DATABASE
  # On first startup MySQL automatically:
  #   - creates root user with MYSQL_ROOT_PASSWORD
  #   - creates MYSQL_USER with MYSQL_PASSWORD
  #   - creates MYSQL_DATABASE
  #   - grants MYSQL_USER full access to MYSQL_DATABASE only
  # -------------------------------------------------------------
  db:
    # Pinned to exact MySQL version to prevent unexpected updates
    # Update this version intentionally and test before changing
    image: mysql:8.0.36
    # Container name intentionally omitted
    # Docker generates a unique name automatically
    # This allows multiple instances and avoids naming conflicts
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_USER: "${MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
    volumes:
      - mysql_data:/var/lib/mysql
      # Run message.sql automatically on first container startup
      # MySQL only runs files in this directory on fresh initialization
      - ./db-init/message.sql:/docker-entrypoint-initdb.d/message.sql:ro
    restart: unless-stopped
    # Only accessible internally by other containers
    # Not exposed to the outside world for security
    networks:
      - app_network
    # CMD-SHELL runs the command through the container shell
    # which correctly expands environment variables at runtime
    # $$ escapes the variable so docker-compose does not
    # interpret it as a compose substitution — the shell inside
    # the container receives a literal $ and expands it correctly
    # || exit 1 makes failure explicit for Docker health tracking
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD --silent || exit 1"]
      interval: 10s      # Check every 10 seconds
      timeout: 5s        # Fail the check if no response within 5 seconds
      retries: 5         # Mark as unhealthy after 5 consecutive failures
      start_period: 30s  # Give MySQL 30 seconds to initialize before checking

  # -------------------------------------------------------------
  # Flask Application Service
  # Two instances are started using --scale flask=2 at runtime:
  #   docker-compose up --build --scale flask=2
  #
  # --scale is the correct way to run multiple replicas in plain
  # Docker Compose (without Swarm). deploy.replicas is a Swarm
  # directive and is silently ignored by plain docker compose up
  #
  # No ports exposed directly — all traffic enters via Nginx
  # User is intentionally omitted here — already set in Dockerfile
  # via the USER directive. Duplicating it in Compose would be
  # redundant since Dockerfile already owns that responsibility
  #
  # Receives: DB_HOST, DB_PORT, DB_USER, DB_PASSWORD, DB_NAME
  #           DB_MAX_RETRIES, DB_RETRY_INTERVAL, DB_MAX_SLEEP
  # -------------------------------------------------------------
  flask:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_HOST: "${DB_HOST}"
      DB_PORT: "${DB_PORT}"
      DB_USER: "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_NAME: "${DB_NAME}"
      DB_MAX_RETRIES: "${DB_MAX_RETRIES}"
      DB_RETRY_INTERVAL: "${DB_RETRY_INTERVAL}"
      DB_MAX_SLEEP: "${DB_MAX_SLEEP}"
    # expose makes port 5000 visible to other containers only
    # It does NOT open the port on the host machine
    # All external traffic must go through Nginx on port 80
    expose:
      - "5000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/ready"]
      interval: 30s      # Check every 30 seconds
      timeout: 10s       # Fail if no response within 10 seconds
      retries: 3         # Mark unhealthy after 3 consecutive failures
      start_period: 15s  # Give Flask 15 seconds to boot before first check
    restart: unless-stopped
    networks:
      - app_network

  # -------------------------------------------------------------
  # Nginx Reverse Proxy & Load Balancer
  # The only service exposed to the outside world on port 80
  # Distributes incoming requests across Flask instances
  # using round-robin (Nginx default behaviour)
  # Reads config from ./nginx/nginx.conf mounted read-only
  # -------------------------------------------------------------
  nginx:
    image: nginx:1.27.3-alpine
    ports:
      - "80:80"
    volumes:
      # Mount Nginx config read-only — container cannot modify it
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - flask
    restart: unless-stopped
    networks:
      - app_network

# -------------------------------------------------------------
# Named Volume
# Stores MySQL data permanently outside the container
# Data survives even if the container is deleted
# -------------------------------------------------------------
volumes:
  mysql_data:
    driver: local

# -------------------------------------------------------------
# Internal Network
# All containers communicate privately on this network
# Only Nginx is exposed to the outside world on port 80
# MySQL and Flask are internal only
# -------------------------------------------------------------
networks:
  app_network:
    driver: bridge
