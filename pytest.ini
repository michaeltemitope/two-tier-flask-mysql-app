# =============================================================
# pytest.ini
# Purpose  : Configures pytest — the Python test runner
# Run with : pytest
# Used in  : GitHub Actions CI pipeline (test stage)
# =============================================================

[pytest]

# -------------------------------------------------------------
# testpaths
# Tells pytest exactly where to look for test files.
# Without this, pytest scans the entire project which is slow
# and can accidentally pick up unrelated Python files.
# -------------------------------------------------------------
testpaths = tests

# -------------------------------------------------------------
# python_files / python_classes / python_functions
# The naming patterns pytest uses to discover tests.
# test_*.py    — any file starting with test_
# Test*        — any class starting with Test
# test_*       — any function starting with test_
# These match pytest's defaults but are declared explicitly
# so the intent is clear to anyone reading the config.
# -------------------------------------------------------------
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# -------------------------------------------------------------
# addopts — additional options applied to every pytest run
#
# -v          : verbose output — shows each test name and result
#               instead of just a dot. Essential in CI so you
#               can see exactly which test passed or failed.
#
# --tb=short  : short traceback format. Shows the relevant
#               lines of a failure without printing the entire
#               call stack. Keeps CI logs readable.
# -------------------------------------------------------------
addopts = -v --tb=short
